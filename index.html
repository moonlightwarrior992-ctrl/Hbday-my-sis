<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mikku</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Dancing+Script:wght@700&family=Montserrat:wght@200;400;600&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0d1a0d; 
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        .garden-bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?q=80&w=2000');
            background-size: cover;
            background-position: center;
            z-index: 0;
            filter: saturate(1.1) brightness(0.6);
        }

        .sunlight {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 10% 10%, rgba(255,255,180,0.15) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        .page {
            position: absolute;
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            filter: blur(30px);
            transition: all 2s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 5; text-align: center;
        }

        .page.active {
            opacity: 1; visibility: visible;
            filter: blur(0px);
        }

        .content-block {
            max-width: 600px;
            padding: 40px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .dob-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            letter-spacing: 8px;
            font-size: 1.3rem;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .cinematic-sub {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.6rem, 1.5vw, 0.9rem);
            letter-spacing: 12px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
        }

        .hero-text {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3rem, 10vw, 8.5rem);
            line-height: 1.1;
            margin: 10px 0;
            background: linear-gradient(to bottom, #fff 0%, #ff69b4 50%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(255, 105, 180, 0.4));
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .glow-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 18px 55px;
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.5s;
            backdrop-filter: blur(10px);
            border-radius: 50px;
            margin-top: 20px;
        }

        .glow-btn:hover {
            background: #ff69b4;
            border-color: #ff69b4;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.6);
            transform: scale(1.05);
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 2; pointer-events: none; }
    </style>
</head>
<body>

    <div class="garden-bg"></div>
    <div class="sunlight"></div>
    <canvas id="visuals"></canvas>

    <audio id="bgMusic" loop>
        <source src="mikku_song.mp3.mp3" type="audio/mpeg">
    </audio>

    <div id="p1" class="page active">
        <h2 class="cinematic-sub">Hidden in the Flowers</h2>
        <button class="glow-btn" id="entryBtn">Enter the Garden</button>
    </div>

    <div id="p2" class="page">
        <div class="content-block">
            <div class="dob-text">06 • 05 • 2009</div>
            <h2 class="cinematic-sub">A Special Day</h2>
            <h1 class="hero-text">Happy Birthday<br>Mikku</h1>
            <p style="color:rgba(255,255,255,0.5); font-size:0.8rem; letter-spacing:3px;">Something is blooming for you...</p>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="content-block">
            <p style="line-height: 2.3; font-weight: 300; font-size: 1.1rem; letter-spacing: 1.5px; color: #fff;">
                To my dear sister,<br>
                May your year be as colorful as a blooming garden and as light as a butterfly's wing. 
                Keep shining and growing, Mikku.
                <br><br>
                <span style="color: #ff69b4; font-weight: bold; letter-spacing: 4px;">ALWAYS ❤️</span>
            </p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('visuals');
        const ctx = canvas.getContext('2d');
        const music = document.getElementById('bgMusic');
        const entryBtn = document.getElementById('entryBtn');
        
        let butterflies = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Butterfly {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 8 + 12;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                const species = [
                    {m: '#ff8c00', p: '#111', s: '#fff'}, {m: '#1e90ff', p: '#111', s: '#fff'},
                    {m: '#ff69b4', p: '#4b0082', s: '#fff'}, {m: '#ffffff', p: '#333', s: '#ffff00'}
                ];
                this.colors = species[Math.floor(Math.random() * species.length)];
                this.flap = 0;
                this.flapSpeed = Math.random() * 0.1 + 0.1;
            }

            draw() {
                this.flap += this.flapSpeed;
                const wingScale = Math.abs(Math.sin(this.flap));
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.atan2(this.vy, this.vx) + Math.PI/2);

                [-1, 1].forEach(side => {
                    ctx.save();
                    ctx.scale(side * (0.1 + wingScale * 0.9), 1);
                    ctx.fillStyle = this.colors.m;
                    ctx.strokeStyle = this.colors.p;
                    ctx.lineWidth = 1;

                    // Upper wing
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(this.size * 1, -this.size * 2, this.size * 2.5, -this.size * 0.5, 0, 0);
                    ctx.fill(); ctx.stroke();

                    // Lower wing
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(this.size * 1.8, this.size * 0.8, this.size * 1.2, this.size * 2.2, 0, 0);
                    ctx.fill(); ctx.stroke();
                    ctx.restore();
                });

                // Tapered Body
                ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.ellipse(0, 0, 2, this.size * 0.5, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(0, -this.size * 0.6, 2.5, 0, Math.PI * 2); ctx.fill(); // Head
                ctx.restore();
            }

            update() {
                this.x += this.vx; this.y += this.vy;
                if(Math.random() < 0.02) { this.vx += (Math.random()-0.5); this.vy += (Math.random()-0.5); }
                if(this.x < -50) this.x = canvas.width + 50; if(this.x > canvas.width + 50) this.x = -50;
                if(this.y < -50) this.y = canvas.height + 50; if(this.y > canvas.height + 50) this.y = -50;
            }
        }

        function init() { for(let i=0; i<15; i++) butterflies.push(new Butterfly()); loop(); }
        function loop() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            butterflies.forEach(b => { b.update(); b.draw(); });
            requestAnimationFrame(loop);
        }

        function showPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            setTimeout(() => {
                document.getElementById('p'+num).classList.add('active');
                if(num === 2) setTimeout(() => showPage(3), 8000);
            }, 100);
        }

        entryBtn.addEventListener('click', () => {
            music.play().catch(e => console.log("Music blocked until click"));
            showPage(2);
        });

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        init();
    </script>
</body>
</html>
